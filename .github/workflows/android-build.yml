name: Android Build (AgroGB)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Setup Repo
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📦 Install Dependencies
        run: |
          npm ci --legacy-peer-deps

#      - name: 🛡️ Super Audit (Build Guard)
#        run: |
#          npm run verify

      - name: ⚙️ Expo Prebuild
        run: npx expo prebuild --platform android --clean

      - name: 🔑 Setup Release Keystore
        run: |
          # 1. Generate Keystore
          keytool -genkey -v -keystore android/app/release.keystore \
          -storepass android -alias my-key-alias -keypass android \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -dname "CN=AgroGB,O=AgroGB,C=BR"

          # 2. Configure gradle.properties for Signing
          echo "" >> android/gradle.properties
          echo "MYAPP_UPLOAD_STORE_FILE=release.keystore" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_ALIAS=my-key-alias" >> android/gradle.properties
          echo "MYAPP_UPLOAD_STORE_PASSWORD=android" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_PASSWORD=android" >> android/gradle.properties
          
          # 3. Increase memory significantly to avoid OOM
          echo "org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError" >> android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "org.gradle.parallel=true" >> android/gradle.properties

      - name: 🐘 Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: agrogb-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
