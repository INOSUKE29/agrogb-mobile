name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Setup Repo
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          # Removido o cache automático do gradle que estava causando erro de 'No file matched'
          # devido ao nome do repositório possuir um ponto final (.)

      - name: 📦 Install Dependencies
        run: |
          npm install
          node patch_expo.js

      - name: ⚙️ Expo Prebuild
        run: |
          npx expo prebuild --platform android --clean
          node patch_gradle.js
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: 🔑 Setup Release Keystore
        run: |
          # 1. Generate Keystore
          keytool -genkey -v -keystore android/app/release.keystore \
          -storepass android -alias my-key-alias -keypass android \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -dname "CN=AgroGB,O=AgroGB,C=BR"

          # 2. Configure gradle.properties for Signing and Performance
          echo "" >> android/gradle.properties
          echo "MYAPP_UPLOAD_STORE_FILE=release.keystore" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_ALIAS=my-key-alias" >> android/gradle.properties
          echo "MYAPP_UPLOAD_STORE_PASSWORD=android" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_PASSWORD=android" >> android/gradle.properties
          
          # Performance and Stability tweaks
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "org.gradle.parallel=false" >> android/gradle.properties
          echo "org.gradle.configureondemand=false" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m" >> android/gradle.properties

      - name: 🐘 Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=armeabi-v7a,arm64-v8a \
            --no-daemon \
            --max-workers=1 \
            --stacktrace
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"


      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: agrogb-v7-release
          path: android/app/build/outputs/apk/release/app-release.apk
