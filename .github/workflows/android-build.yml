name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Setup Repo
        uses: actions/checkout@v4
        with:
          path: repo

      - name: 🧹 Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: repo/package-lock.json

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: 📦 Install Dependencies
        working-directory: repo
        run: |
          npm install
          node patch_expo.js

      - name: ⚙️ Expo Prebuild
        working-directory: repo
        run: |
          npx expo prebuild --platform android --clean
          node patch_gradle.js
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: 🔑 Setup Release Keystore
        working-directory: repo
        run: |
          # 1. Generate Keystore
          keytool -genkey -v -keystore android/app/release.keystore \
          -storepass android -alias my-key-alias -keypass android \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -dname "CN=AgroGB,O=AgroGB,C=BR"

          # 2. Configure gradle.properties for Signing
          echo "" >> android/gradle.properties
          echo "MYAPP_UPLOAD_STORE_FILE=release.keystore" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_ALIAS=my-key-alias" >> android/gradle.properties
          echo "MYAPP_UPLOAD_STORE_PASSWORD=android" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_PASSWORD=android" >> android/gradle.properties

      - name: 🐘 Build APK
        working-directory: repo/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease -PreactNativeArchitectures=armeabi-v7a,arm64-v8a --no-daemon --stacktrace
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g"

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: agrogb-v7-release
          path: repo/android/app/build/outputs/apk/release/app-release.apk
