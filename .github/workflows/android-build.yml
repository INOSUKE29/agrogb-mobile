name: Android Build (AgroGB)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-24.04

    steps:
      - name: 🏗 Setup Repo
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📦 Install Dependencies
        run: |
          npm ci --legacy-peer-deps

      - name: 🛡️ Super Audit (Build Guard)
        run: |
          npm run verify

      - name: ⚙️ Expo Prebuild
        run: npx expo prebuild --platform android --clean

      - name: 🔑 Gerar Keystore Temporária (Standalone)
        run: |
          keytool -genkey -v -keystore android/app/temp.keystore -alias tempalias -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=AgroGB, OU=Test, O=Test, L=Test, S=Test, C=BR" -storepass agro123 -keypass agro123
          echo "" >> android/gradle.properties
          echo "MYAPP_UPLOAD_STORE_FILE=temp.keystore" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_ALIAS=tempalias" >> android/gradle.properties
          echo "MYAPP_UPLOAD_STORE_PASSWORD=agro123" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_PASSWORD=agro123" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx6g" >> android/gradle.properties

      - name: 🐘 Build APK Standalone (Pronto para Rodar)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: agrogb-standalone-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          tag_name: v-apk-latest
          name: AgroGB Build Atualizado (Download Direto)
          body: |
            ### 📦 AgroGB APK - Build de Alta Performance
            Este APK contém as últimas atualizações de Banco de Dados (Master V10.4) e correções de segurança.
            
            **Instruções:** Este é o APK Standalone Final! Clique no arquivo `app-release.apk` abaixo para baixar e instalar.
          draft: false
          prerelease: false
          files: android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
