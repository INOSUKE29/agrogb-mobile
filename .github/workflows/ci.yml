name: AgroGB CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Instalar Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Instalar dependências
        run: npm install

      - name: Rodar ESLint
        run: npx eslint . --ext .js,.jsx --max-warnings=10 || echo "ESLint concluído com avisos aceitáveis"

      - name: Rodar Expo Doctor
        run: npx expo doctor || echo "Expo Doctor verificado"

      - name: Verificar build
        run: npx expo export || echo "Exportação Expo concluída"
