name: AgroGB CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar dependências
        run: npm install

      - name: Rodar ESLint
        run: npx eslint .

      - name: Rodar Expo Doctor
        run: npx expo-doctor

      - name: Verificar buildability (Export)
        run: npx expo export
